specVersion: 1.3.0
indexerHints:
  prune: auto

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: SupplyGuarantee
    network: sepolia
    source:
      address: "0xAA187d38D0226e1A4869ca596Fe43DcF3CaeE7D2"
      abi: SupplyGuarantee
      startBlock: 11038536
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Order
        - OrderParticipant
      abis:
        - name: SupplyGuarantee
          file: ./abis/SupplyGuarantee.json
      eventHandlers:
        - event: OrderCreated(indexed uint256,indexed address,indexed address,address,uint256,uint16)
          handler: handleOrderCreated
        - event: OrderStageChanged(indexed uint256,uint8,uint8)
          handler: handleOrderStageChanged
      file: ./src/supply-guarantee.ts
